# Shared training configuration for fair comparison across SSL methods.
# All methods use identical optimizer, LR, schedule, and epoch count
# so that performance differences reflect the method, not the training recipe.

model:
  latent_dim: 256

training:
  epochs: 500
  batch_size: 256
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-5
  scheduler: cosine   # CosineAnnealingLR to zero, no warmup

data:
  image_size: 96
  num_workers: 4

logging:
  log_interval: 50    # Log batch loss every N steps
  eval_interval: 5    # Log epoch loss + run k-NN eval every N epochs
  vis_interval: 10    # Save visualisations every N epochs
  save_interval: 50   # Save periodic checkpoint every N epochs

seed: 42
